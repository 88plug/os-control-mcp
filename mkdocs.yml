site_name: os-control-mcp
site_description: "The sanctioned OS motor cortex for an agent on a Linux box: control systemd, logind, journald, and D-Bus through structured interfaces."
site_url: https://88plug.github.io/os-control-mcp/
repo_url: https://github.com/88plug/os-control-mcp
repo_name: 88plug/os-control-mcp
edit_uri: edit/main/docs/
use_directory_urls: true
strict: true

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - content.code.copy
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - tables
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details
  - toc:
      permalink: true

nav:
  - Overview: index.md
